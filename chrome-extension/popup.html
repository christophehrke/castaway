<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 16px;
            margin: 0;
            background: #fff;
            color: #1a1a1a;
        }
        h2 {
            margin: 0 0 12px 0;
            font-size: 16px;
            font-weight: 600;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            background: #4f46e5;
            color: #fff;
            width: 100%;
            margin-bottom: 6px;
        }
        button:hover {
            opacity: 0.9;
        }
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: #22c55e;
        }
        #status-dot.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #status-text {
            font-size: 13px;
            font-weight: 500;
        }
        #org-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        #recording-timer {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin: 12px 0;
            font-variant-numeric: tabular-nums;
        }
        #stop-btn {
            background: #ef4444;
            color: #fff;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 12px 0;
        }
        #settings-btn {
            font-size: 12px;
            background: transparent;
            color: #666;
            padding: 4px 0;
        }
        #settings-btn:hover {
            color: #333;
        }
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin: 6px 0;
        }
        .success-text {
            color: #22c55e;
            font-size: 14px;
            font-weight: 500;
            margin: 8px 0;
        }
        a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }
        a:hover {
            text-decoration: underline;
        }
        progress {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            margin: 8px 0;
        }
        progress::-webkit-progress-bar {
            background: #eee;
            border-radius: 3px;
        }
        progress::-webkit-progress-value {
            background: #4f46e5;
            border-radius: 3px;
        }
        #upload-progress {
            font-size: 13px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <h2>FlowCast Recorder</h2>

        <!-- Settings Section (shown when not configured) -->
        <div id="settings-section" style="display:none;">
            <label>API Key</label>
            <input type="password" id="api-key-input" placeholder="fc_...">
            <label>Server URL</label>
            <input type="text" id="server-url-input" placeholder="https://app.flowcast.io" value="http://localhost:8000">
            <button id="save-settings-btn">Save & Connect</button>
            <div id="settings-error" class="error-text" style="display:none;"></div>
        </div>

        <!-- Status Section (shown when configured) -->
        <div id="status-section" style="display:none;">
            <div id="status-indicator">
                <span id="status-dot"></span>
                <span id="status-text">Ready</span>
            </div>
            <div id="org-name"></div>

            <!-- Ready state -->
            <div id="ready-controls" style="display:none;">
                <button id="start-btn">Start Recording</button>
            </div>

            <!-- Recording state -->
            <div id="recording-controls" style="display:none;">
                <div id="recording-timer">00:00</div>
                <button id="stop-btn">Stop Recording</button>
            </div>

            <!-- Uploading state -->
            <div id="uploading-controls" style="display:none;">
                <div id="upload-progress">Uploading...</div>
                <progress id="upload-bar" value="0" max="100"></progress>
            </div>

            <!-- Uploaded state -->
            <div id="uploaded-controls" style="display:none;">
                <div class="success-text">✓ Uploaded successfully!</div>
                <a id="open-in-flowcast" href="#" target="_blank">Open in FlowCast</a>
                <button id="new-recording-btn">New Recording</button>
            </div>

            <!-- Error state -->
            <div id="error-controls" style="display:none;">
                <div id="error-message" class="error-text"></div>
                <button id="retry-btn">Retry</button>
            </div>

            <hr>
            <button id="settings-btn">Settings</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
